<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고등학교 계모임 정기공지</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-weight: bold;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .info-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-color);
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .time {
            font-weight: bold;
            color: #555;
            min-width: 60px;
        }
        .btn-link {
            display: block;
            text-align: center;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: bold;
        }
        .footer {
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            margin-top: 30px;
        }
        .room-tag {
            display: inline-block;
            background: #e1f5fe;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 0.85rem;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📢 고등학교 계모임 공지</h1>

    <div class="section">
        <div class="section-title">📅 일시 및 장소</div>

            <strong>7월 11일(토) - 12일(일)</strong><br>
            괭이바다펜션
        </div>
    </div>

    <div class="section">

        <div class="info-box">

        </div>
    </div>

    <div class="section">

        <div class="info-box">
            <p style="margin-top:0;"><strong>[저녁반]</strong> 괭이바다<br>
            <span style="color:#666;">재현, 정제</span></p>
            <p style="margin-bottom:0;"><strong>[심야반]</strong> 아침햇살, 노을, 파도<br>
            <span style="color:#666;">홍철, 영근, 최씨 & 슈렉</span></p>
        </div>
    </div>

    <div class="section">
        <div class="section-title">💡 안내사항</div>
        <div class="info-box" style="font-size: 0.9rem;">
            📍 <strong>로봇랜드 (차로 15분)</strong><br>
            일찍 오시는 분들은 로봇랜드 방문 추천! (개인 부담)
        </div>
    </div>

    <a href="http://www.xn--9c0bk2iuzidofmxit3s.com/" class="btn-link" target="_blank">펜션 홈페이지 보기</a>

    <div class="footer">
        반가운 얼굴들, 곧 만나요! 😊
    </div>
</div>

</body>
</html>
